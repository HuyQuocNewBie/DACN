name: MemoSpace Daily Reminder

on:
  schedule:
    # Chạy mỗi ngày lúc 0:00 UTC = 7:00 sáng giờ Việt Nam (ICT = UTC+7)
    - cron: '0 0 * * *'
  workflow_dispatch: # Cho phép chạy thủ công để test

jobs:
  send-reminder:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Install dependencies
        run: |
          sudo apt-get install -y python3-pip
          pip3 install pymysql requests

      - name: Send daily reminder emails
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          DB_HOST: ${{ secrets.DB_HOST }}
          DB_PORT: ${{ secrets.DB_PORT }}
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASS: ${{ secrets.DB_PASS }}
          DB_NAME: ${{ secrets.DB_NAME }}
        run: |
          python3 << 'EOF'
          import os
          import json
          import time
          import requests
          import pymysql

          # DB Connection
          try:
              conn = pymysql.connect(
                  host=os.environ['DB_HOST'],
                  port=int(os.environ['DB_PORT']),
                  user=os.environ['DB_USER'],
                  password=os.environ['DB_PASS'],
                  database=os.environ['DB_NAME'],
                  ssl={'ssl': {}},
                  cursorclass=pymysql.cursors.DictCursor,
                  connect_timeout=30
              )
              print("✅ DB connected!")
          except Exception as e:
              print(f"❌ DB connection failed: {e}")
              exit(1)

          # Query users with due cards
          with conn.cursor() as cur:
              cur.execute("""
                  SELECT u.email, u.username, COUNT(c.id) as due_count,
                         GROUP_CONCAT(DISTINCT d.title SEPARATOR ', ') as decks
                  FROM users u
                  JOIN decks d ON d.user_id = u.id
                  JOIN cards c ON c.deck_id = d.id
                  WHERE c.next_review_date <= CURDATE()
                  AND u.status = 'active'
                  AND u.role != 'admin'
                  GROUP BY u.id, u.email, u.username
                  HAVING due_count > 0
              """)
              users = cur.fetchall()

          conn.close()

          if not users:
              print("✅ No users with due cards today.")
              exit(0)

          print(f"📋 Found {len(users)} user(s) to notify")

          sent = 0
          failed = 0
          api_key = os.environ['RESEND_API_KEY']

          for user in users:
              email = user['email']
              username = user['username']
              due_count = user['due_count']
              decks = user['decks'] or ''

              print(f"📧 Sending to: {email} ({due_count} cards)")

              html = f"""
              <div style="font-family:sans-serif;max-width:600px;margin:20px auto;padding:24px;border-radius:12px;border:1px solid #e5e7eb">
                <h2 style="color:#4f46e5">Xin chào {username}! 👋</h2>
                <p>Bạn có <strong style="color:#ef4444;font-size:1.1em">{due_count} thẻ</strong> cần ôn tập hôm nay!</p>
                <p style="color:#6b7280">📚 Bộ thẻ: {decks}</p>
                <a href="https://memorize-virid.vercel.app"
                   style="display:inline-block;margin-top:16px;background:#4f46e5;color:white;padding:12px 28px;border-radius:8px;text-decoration:none;font-weight:bold">
                  Ôn tập ngay →
                </a>
                <p style="color:#9ca3af;font-size:12px;margin-top:24px">
                  MemoSpace - Hệ thống học tập thông minh
                </p>
              </div>
              """

              resp = requests.post(
                  "https://api.resend.com/emails",
                  headers={
                      "Authorization": f"Bearer {api_key}",
                      "Content-Type": "application/json"
                  },
                  json={
                      "from": "MemoSpace <onboarding@resend.dev>",
                      "to": [email],
                      "subject": f"📚 Bạn có {due_count} thẻ cần ôn tập hôm nay!",
                      "html": html
                  }
              )

              if resp.status_code in (200, 201):
                  print(f"  ✅ Sent OK")
                  sent += 1
              else:
                  print(f"  ❌ Failed ({resp.status_code}): {resp.text}")
                  failed += 1

              time.sleep(1)

          print(f"\n📊 Summary: ✅ Sent={sent}  ❌ Failed={failed}")
          EOF
